<!DOCTYPE html>
<html>
<head>
  <title>Minima Tip Jar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      max-width: 300px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #6c5ce7;
      color: white;
    }

    button:hover {
      background: #5848c2;
    }

    #status {
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>💸 Tip Jar</h2>
  <p id="status">Connecting...</p>

  <button onclick="sendTip(0.0001)">☕ Tip 0.0001</button>
  <button onclick="sendTip(0.001)">🍕 Tip 0.001</button>
  <button onclick="sendTip(0.01)">🚀 Tip 0.01</button>
</div>

<script src="app.js"></script>

</body>
</html>
